name: Sync upstream & Build image

on:
  schedule:
    # 每天北京时间 10:00 (UTC 02:00) 检查上游更新
    - cron: "0 2 * * *"
  push:
    branches: [main, fix/*]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      no_changes: ${{ steps.sync.outputs.no_changes }}
      merged: ${{ steps.sync.outputs.merged }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream main
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/AaronL725/grok-register.git || true
          git fetch upstream main

          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "merged=false" >> "$GITHUB_OUTPUT"
            echo "上游无更新"
            exit 0
          fi

          echo "no_changes=false" >> "$GITHUB_OUTPUT"
          echo "发现上游更新，尝试合并..."

          git checkout main
          if git merge upstream/main --no-edit -m "sync: merge upstream/main ($(date +%Y-%m-%d))"; then
            git push origin main
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "✅ 无冲突，已自动合并"
          else
            git merge --abort
            echo "merged=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ 存在冲突，创建 PR..."

            BRANCH="sync/upstream-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git merge upstream/main --no-commit --no-ff || true
            git add -A
            git commit -m "sync: upstream/main ($(date +%Y-%m-%d)) - 存在冲突需手动解决" || true
            git push origin "$BRANCH"

            gh pr create \
              --title "⚠️ 同步上游更新 - 有冲突需手动解决 ($(date +%Y-%m-%d))" \
              --body "上游仓库有新更新，但与本地修改存在冲突，请手动解决后合并。" \
              --base main \
              --head "$BRANCH" \
              --label "upstream-sync" || true

            echo "已创建冲突 PR: $BRANCH"
          fi

  build:
    runs-on: ubuntu-latest
    needs: sync-upstream
    if: |
      always() &&
      (github.event_name != 'schedule' || needs.sync-upstream.outputs.no_changes != 'true')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## 🐳 镜像已构建并推送" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "镜像: \`${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "拉取命令:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Notify via Telegram (if configured)
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="🐳 grok-register 镜像已更新！

          镜像: ${{ env.IMAGE_NAME }}:latest
          提交: ${{ github.sha }}

          服务器拉取:
          docker pull ${{ env.IMAGE_NAME }}:latest && docker compose up -d" \
            -d parse_mode="HTML"

      - name: Always notify (GitHub)
        if: always()
        run: |
          echo "## 📦 新镜像可用" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "镜像 \`${{ env.IMAGE_NAME }}:latest\` 已更新，请手动拉取部署。" >> "$GITHUB_STEP_SUMMARY"
